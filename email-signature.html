<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="color-scheme" content="light dark">
<meta name="supported-color-schemes" content="light dark">
<title>Lindsay Young — Email Signature</title>
<style>
  @media only screen and (max-width: 480px) {
    .sig-stack { display:block !important; width:100% !important; }
    .sig-headshot-cell { padding:0 0 16px 0 !important; }
    .sig-info-cell { padding:0 !important; }
  }
  .sig-dark { display:none; }
  @media (prefers-color-scheme: dark) {
    .sig-card { background:transparent !important; }
    .sig-name, .sig-link { color:#ededed !important; }
    .sig-divider { border-top-color:#4d4d4d !important; }
    .sig-light { display:none !important; }
    .sig-dark { display:block !important; }
  }
</style>
</head>
<body style="margin:0;padding:32px;background:#ededed;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;">

<!--
  EMAIL SIGNATURE — Lindsay Young, Lindsay Dev Creative (updated from Figma node 43:302)
  Replace src values with hosted https:// URLs before pasting into Gmail/Outlook:
    headshot:     lindsay-headshot.png
    logo:         ldc-logo-circle.png  (export the circular wordmark from Figma)
  Inline SVGs for contact + social icons render in Apple Mail and Outlook desktop.
  Gmail strips <svg>; for Gmail use, swap SVGs for hosted PNG icons.
-->

<table class="sig-card" role="presentation" cellpadding="0" cellspacing="0" border="0" style="border-collapse:collapse;background:#ffffff;">
  <tr>
    <td colspan="2" style="padding:0 0 24px 0;">
      <div class="sig-divider" style="border-top:1px solid #b8b8b8;min-width:290px;font-size:0;line-height:0;">&nbsp;</div>
    </td>
  </tr>
  <tr class="sig-stack-row">
    <!-- Headshot -->
    <td class="sig-stack sig-headshot-cell" style="padding:0 24px 0 0;vertical-align:top;">
      <img src="https://raw.githubusercontent.com/lindsaydevyoung-dev/ldc-brand-assets/main/lindsay-headshot.png"
           alt="Lindsay Young"
           width="122" height="159"
           style="display:block;width:122px;height:159px;border-radius:2px;object-fit:cover;">
    </td>

    <!-- Info + logo -->
    <td class="sig-stack sig-info-cell" style="padding:0;vertical-align:top;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;">
      <table role="presentation" cellpadding="0" cellspacing="0" border="0" style="border-collapse:collapse;">
        <tr>
          <!-- Info column -->
          <td style="vertical-align:top;padding-right:4px;">

            <!-- Name block -->
            <div style="padding-bottom:10px;">
              <div class="sig-name" style="font-size:24px;font-weight:700;color:#0a0a0a;letter-spacing:-0.01em;line-height:1.09;">
                Lindsay Young
              </div>
              <div style="font-size:11px;font-weight:500;color:#d4a85a;letter-spacing:0.08em;text-transform:uppercase;margin-top:6px;line-height:1.4;">
                Owner &amp; Creative Director
              </div>
            </div>

            <!-- Contact block -->
            <table role="presentation" cellpadding="0" cellspacing="0" border="0" style="border-collapse:collapse;font-size:13px;line-height:1.7;">
              <tr>
                <td style="padding:0 8px 0 2px;vertical-align:middle;line-height:1;">
                  <img src="https://raw.githubusercontent.com/lindsaydevyoung-dev/ldc-brand-assets/main/icon-globe.png"
                       alt="" width="14" height="14"
                       class="sig-light" style="display:block;width:14px;height:14px;border:0;">
                  <img src="https://raw.githubusercontent.com/lindsaydevyoung-dev/ldc-brand-assets/main/icon-globe-white.png"
                       alt="" width="14" height="14"
                       class="sig-dark" style="width:14px;height:14px;border:0;">
                </td>
                <td style="vertical-align:middle;">
                  <a href="https://www.lindsaydevcreative.com/"
                     class="sig-link" style="color:#1a1a1a;text-decoration:none;font-weight:400;">lindsaydevcreative.com</a>
                </td>
              </tr>
              <tr>
                <td style="padding:0 8px 0 2px;vertical-align:middle;line-height:1;">
                  <img src="https://raw.githubusercontent.com/lindsaydevyoung-dev/ldc-brand-assets/main/icon-email.png"
                       alt="" width="14" height="14"
                       class="sig-light" style="display:block;width:14px;height:14px;border:0;">
                  <img src="https://raw.githubusercontent.com/lindsaydevyoung-dev/ldc-brand-assets/main/icon-email-white.png"
                       alt="" width="14" height="14"
                       class="sig-dark" style="width:14px;height:14px;border:0;">
                </td>
                <td style="vertical-align:middle;">
                  <a class="sig-link" href="mailto:lindsay@lindsaydevcreative.com"
                     style="color:#0a0a0a;text-decoration:none;font-weight:400;">lindsay@lindsaydevcreative.com</a>
                </td>
              </tr>
              <tr>
                <td style="padding:0 8px 0 2px;vertical-align:middle;line-height:1;">
                  <img src="https://raw.githubusercontent.com/lindsaydevyoung-dev/ldc-brand-assets/main/icon-phone.png"
                       alt="" width="14" height="14"
                       class="sig-light" style="display:block;width:14px;height:14px;border:0;">
                  <img src="https://raw.githubusercontent.com/lindsaydevyoung-dev/ldc-brand-assets/main/icon-phone-white.png"
                       alt="" width="14" height="14"
                       class="sig-dark" style="width:14px;height:14px;border:0;">
                </td>
                <td style="vertical-align:middle;">
                  <a href="tel:+18649065253"
                     class="sig-link" style="color:#1a1a1a;text-decoration:none;font-weight:400;">(864) 906-5253</a>
                </td>
              </tr>
            </table>

            <!-- Social icons -->
            <table role="presentation" cellpadding="0" cellspacing="0" border="0" style="border-collapse:collapse;margin-top:12px;">
              <tr>
                <td style="padding-right:6px;vertical-align:middle;">
                  <a href="https://www.linkedin.com/in/lindsaydevcreative/" style="text-decoration:none;display:inline-block;line-height:0;">
                    <img src="https://raw.githubusercontent.com/lindsaydevyoung-dev/ldc-brand-assets/main/linkedin.png"
                         alt="LinkedIn" width="16" height="16"
                         class="sig-light" style="display:block;width:16px;height:16px;border:0;">
                    <img src="https://raw.githubusercontent.com/lindsaydevyoung-dev/ldc-brand-assets/main/linkedin-white.png"
                         alt="LinkedIn" width="16" height="16"
                         class="sig-dark" style="width:16px;height:16px;border:0;">
                  </a>
                </td>
                <td style="padding-right:6px;vertical-align:middle;">
                  <a href="https://www.instagram.com/?hl=en" style="text-decoration:none;display:inline-block;line-height:0;">
                    <img src="https://raw.githubusercontent.com/lindsaydevyoung-dev/ldc-brand-assets/main/instagram.png"
                         alt="Instagram" width="16" height="16"
                         class="sig-light" style="display:block;width:16px;height:16px;border:0;">
                    <img src="https://raw.githubusercontent.com/lindsaydevyoung-dev/ldc-brand-assets/main/instagram-white.png"
                         alt="Instagram" width="16" height="16"
                         class="sig-dark" style="width:16px;height:16px;border:0;">
                  </a>
                </td>
                <td style="vertical-align:middle;">
                  <a href="https://www.facebook.com/lindsaydevcreative" style="text-decoration:none;display:inline-block;line-height:0;">
                    <img src="https://raw.githubusercontent.com/lindsaydevyoung-dev/ldc-brand-assets/main/facebook.png"
                         alt="Facebook" width="16" height="16"
                         class="sig-light" style="display:block;width:16px;height:16px;border:0;">
                    <img src="https://raw.githubusercontent.com/lindsaydevyoung-dev/ldc-brand-assets/main/facebook-white.png"
                         alt="Facebook" width="16" height="16"
                         class="sig-dark" style="width:16px;height:16px;border:0;">
                  </a>
                </td>
              </tr>
            </table>

          </td>

          <!-- Logo column -->
          <td style="vertical-align:top;padding-left:8px;">
            <a href="https://www.lindsaydevcreative.com/" style="display:inline-block;line-height:0;text-decoration:none;">
              <img class="sig-light" src="https://raw.githubusercontent.com/lindsaydevyoung-dev/ldc-brand-assets/main/ldc-logo-circle.png"
                   alt="Lindsay Dev Creative"
                   width="60" height="60"
                   style="display:block;width:60px;height:60px;border:0;">
              <img class="sig-dark" src="https://raw.githubusercontent.com/lindsaydevyoung-dev/ldc-brand-assets/main/ldc-logo-circle-white.png"
                   alt="Lindsay Dev Creative"
                   width="60" height="60"
                   style="width:60px;height:60px;border:0;">
            </a>
          </td>
        </tr>
      </table>
    </td>
  </tr>
</table>

</body>
</html>
